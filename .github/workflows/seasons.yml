name: Update fruit seasons

# Server-side equivalent of a commit hook: the picking routine publishes
# picking.json via the GitHub Contents API (no local commit), so this runs on
# the resulting push and maintains seasons.json deterministically. The routine
# never touches seasons.json. Filtered to picking.json so the bot's own
# seasons.json commit can't retrigger it.
on:
  push:
    branches: [main]
    paths:
      - picking.json
  workflow_dispatch: {} # allow manual runs (smoke test / reruns)

permissions:
  contents: write

jobs:
  seasons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Update seasons.json
        run: python3 scripts/update_seasons.py
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain seasons.json)" ]; then
            git config user.name "scout-seasons-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add seasons.json
            git commit -m "chore: update fruit seasons [skip ci]"
            git push
          else
            echo "seasons.json unchanged"
          fi
